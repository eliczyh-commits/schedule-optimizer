<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>旬度内贸排产优化</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>旬度内贸排产优化</h1>
        <p id="status">正在打开空模板</p>
      </div>
      <div class="actions">
        <button id="loadDefaults" type="button">重置空模板</button>
        <button id="solve" type="button" class="primary">生成方案</button>
      </div>
    </header>

    <main>
      <nav class="tabs" aria-label="输入区域">
        <button class="active" data-tab="basic">资源与日历</button>
        <button data-tab="foreign">外贸与效率</button>
        <button data-tab="rules">保供与约束</button>
        <button data-tab="result">结果</button>
      </nav>

      <section id="basic" class="tab-panel active">
        <div class="grid two">
          <div class="panel">
            <div class="panel-head">
              <button class="panel-toggle" data-toggle-panel type="button">旬度资源</button>
              <button data-add="resources" type="button">新增</button>
            </div>
            <div class="panel-body"><div id="resources"></div></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <button class="panel-toggle" data-toggle-panel type="button">生产日历</button>
              <button data-add="calendar" type="button">新增</button>
            </div>
            <div class="panel-body"><div id="calendar"></div></div>
          </div>
        </div>
      </section>

      <section id="foreign" class="tab-panel">
        <div class="grid">
          <div class="panel">
            <div class="panel-head">
              <button class="panel-toggle" data-toggle-panel type="button">外贸排产明细</button>
              <div class="panel-actions">
                <button data-import="foreign" type="button">导入Excel</button>
                <button data-add="foreign" type="button">新增</button>
              </div>
            </div>
            <div class="panel-body"><div id="foreignTable"></div></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <button class="panel-toggle" data-toggle-panel type="button">产品生产效率</button>
              <div class="panel-actions">
                <button data-import="efficiency" type="button">导入Excel</button>
                <button data-add="efficiency" type="button">新增</button>
              </div>
            </div>
            <div class="panel-body"><div id="efficiency"></div></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <button class="panel-toggle" data-toggle-panel type="button">现金流</button>
              <div class="panel-actions">
                <button data-import="cashflow" type="button">导入Excel</button>
                <button data-add="cashflow" type="button">新增</button>
              </div>
            </div>
            <div class="panel-body"><div id="cashflow"></div></div>
          </div>
        </div>
      </section>

      <section id="rules" class="tab-panel">
        <div class="grid">
          <div class="panel">
            <div class="panel-head">
              <button class="panel-toggle" data-toggle-panel type="button">HRB500E及600兆帕需求</button>
              <button data-add="demands" type="button">新增</button>
            </div>
            <div class="panel-body"><div id="demands"></div></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <button class="panel-toggle" data-toggle-panel type="button">400兆帕规格比例</button>
              <button data-add="ratios" type="button">新增</button>
            </div>
            <div class="panel-body"><div id="ratios"></div></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <button class="panel-toggle" data-toggle-panel type="button">400兆帕客户需求预报</button>
              <button data-add="forecast" type="button">新增</button>
            </div>
            <div class="panel-body"><div id="forecast"></div></div>
          </div>
        </div>
      </section>

      <section id="result" class="tab-panel">
        <div id="errorBox" class="error hidden"></div>
        <div class="grid">
          <div class="panel">
            <h2>内贸排产方案</h2>
            <div id="plan"></div>
          </div>
          <div class="panel">
            <h2>方案校验</h2>
            <div id="checks"></div>
          </div>
          <div class="panel">
            <h2>400兆帕需求建议</h2>
            <div id="suggestions"></div>
          </div>
        </div>
      </section>
    </main>

    <input id="excelImport" class="hidden" type="file" accept=".xlsx,.xlsm" />
    <script src="/app.js"></script>
  </body>
</html>
